name: 📦 Publish module to PowerShell Gallery
description: Publishes module to https://www.powershellgallery.com/ with the given version number.
on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
        description: The new version number to publish this module as.
    secrets:
      gallerykey:
        required: true
        description: The API key used to publish this module to the PowerShell Gallery.
      gh_token:
        required: true
        description: The GitHub token to use for repo updates.
defaults:
  run:
    shell: pwsh
permissions:
  contents: write # read for actions/checkout to fetch code, and write for actions/create-release
  security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
jobs:
  publish:
    name: 🆙 Release new version
    runs-on: windows-latest
    steps:
      #TODO: validate version
      - name: 📥 Check out script source
        uses: actions/checkout@v6
      - name: 🏗️ Setup .NET
        if: ${{ hashFiles('*.slnx') != '' }}
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: '10.0.x'
      - name: 🏭 Build module .dll
        if: ${{ hashFiles('*.slnx') != '' }}
        run: dotnet publish "/p:Version=$('${{ inputs.version }}' -replace '\A(\w+/)*v')"
      - name: 🏭 Build module .psm1
        if: ${{ hashFiles('scripts/Build-ThisModule.ps1') != '' }}
        run: ./scripts/Build-ThisModule.ps1
      - name: 📝 Generate script wiki pages
        if: ${{ hashFiles('scripts/Write-Wiki.ps1') != '' }}
        run: ./scripts/Write-Wiki.ps1
      - name: 📝 Generate binary wiki pages
        if: ${{ hashFiles('*.slnx') != '' }}
        run: |
          if(!(Get-Module platyPS -ListAvailable -EA Ignore)) {Install-PSResource platyPS -Repository PSGallery -TrustRepository}
          Import-Module platyPS -vb
          $psd1 = "$(Resolve-Path src/bin/*/net*/publish/*.psd1)"
          Import-Module $psd1
          platyPS\New-MarkdownHelp -Module (Split-Path $psd1 -LeafBase) -OutputFolder .github/wiki -EA Ignore
          platyPS\Update-MarkdownHelp .github/wiki
          platyPS\New-ExternalHelp .github/wiki -OutputPath (Split-Path $psd1) -Force
      - name: 📤 Publish binary module
        id: pubdll
        if: ${{ hashFiles('*.slnx') != '' }}
        env:
            GALLERYKEY: ${{ secrets.gallerykey }}
            MODULEVERSION: ${{ inputs.version }}
        run: |
          $psd1 = "$(Resolve-Path src/bin/*/net*/publish/*.psd1)"
          Update-ModuleManifest $psd1 -ModuleVersion ($env:MODULEVERSION -replace '\A(\w+/)*v')
          # see bug https://github.com/PowerShell/PSResourceGet/issues/1806#issuecomment-2992975199
          Get-PSResourceRepository -Name PSGallery
          Publish-PSResource -Path $psd1 -ApiKey $env:GALLERYKEY -Destination .
      - name: 📤 Publish script module
        id: pubpsm1
        if: ${{ hashFiles('scripts/Publish-ThisModule.ps1') != '' }}
        env:
            GALLERYKEY: ${{ secrets.gallerykey }}
            MODULEVERSION: ${{ inputs.version }}
        run: ./scripts/Publish-ThisModule.ps1
      - name: 🏷️ Create release
        id: release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}
        with:
          tag_name: ${{ inputs.version }}
          release_name: Release ${{ inputs.version }}
          draft: false
          prerelease: false
      - name: 🧭 Locate .nupkg file
        id: nupkg
        if: ${{ hashFiles('*.nupkg') }}
        run: |
          "file=$(Resolve-Path *.nupkg -Relative |Split-Path -Leaf)" |
            Out-File "$env:GITHUB_OUTPUT" -Encoding utf8NoBOM -Append
      - name: 📎 Add module .nupkg to release
        if: ${{ hashFiles('*.nupkg') }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ${{ steps.nupkg.outputs.file }}
          asset_name: ${{ steps.nupkg.outputs.file }}
          asset_content_type: application/octet-stream
      - name: 📮 Publish wiki
        if: ${{ hashFiles('.github/wiki/*.md') != '' }}
        uses: spenserblack/actions-wiki@v0.3.0
