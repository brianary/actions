name: 🩺 Continuous integration
description: Build and test
on: workflow_call
defaults:
  run:
    shell: pwsh
permissions:
  contents: read
jobs:
  init:
    name: 🟢 Initialize
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps }}
    steps:
      - name: 📥 Check out script source
        uses: actions/checkout@v6
      - name: 🆔 Determine project type
        run: |
          if(Test-Path src/public/*.ps1) {"job=script-module-test" >> $GITHUB_OUTPUT}
          elseif(Test-Path src/*proj) {"job=binary-module-test" >> $GITHUB_OUTPUT}
  script-module-test:
    name: 🧪 Test on ${{ matrix.os }}
    needs: init
    if: needs.init.outputs.job == 'script-module-test'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: 📥 Check out script source
        uses: actions/checkout@v6
      - name: 🏭 Build module
        run: ./scripts/Build-ThisModule.ps1
      - name: 🔬 Analyze module style
        uses: microsoft/psscriptanalyzer-action@v1.0
        with:
          settings: PSGallery
          output: analysis.sarif
      - name: ⚗️ Test module
        run: Invoke-Pester -Configuration @{TestResult=@{Enabled=$true}}
      - name: 📤 Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: Pester test results for ${{ matrix.os }}
          path: ./testResults.xml
  binary-module-test:
    name: 🧪 Test build on ${{ matrix.os }}
    needs: init
    if: needs.init.outputs.job == 'binary-module-test'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: 📥 Check out source
        uses: actions/checkout@v6
      - name: 🏗️ Setup .NET
        uses: actions/setup-dotnet@v5.4
        with:
          dotnet-version: '10.0.x'
      - name: 🏭 Build module
        run: dotnet publish
      - name: ⚗️ Test module
        run: Invoke-Pester -Configuration @{TestResult=@{Enabled=$true}}
      - name: 📤 Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: Pester test results for ${{ matrix.os }}
          path: ./testResults.xml
